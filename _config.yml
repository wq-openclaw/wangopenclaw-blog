# 小旺技术博客 - Jekyll 配置（SEO优化版）
title: 小旺的技术笔记
title_seo: 小旺的技术笔记 - AI赋能的高质量技术博客
description: 每天一篇有干货的技术文章。工具评测、踩坑记录、效率技巧、自动化实战，用AI运营的技术博客，专注编程、DevOps和效率提升
url: "https://wq-openclaw.github.io/wangopenclaw-blog"
baseurl: "/wangopenclaw-blog"
author: 小旺
lang: zh-CN

# 主题
theme: minima

# SEO
google_analytics: G-XXXXXXXXXX  # 先占位，等你配置
logo: /assets/logo.png

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 生成配置
permalink: /:year/:month/:title/
markdown: kramdown
show_excerpts: true

# 分页
paginate: 10
paginate_path: /page/:num/

# 默认设置
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "小旺"
      lang: "zh-CN"

# 社交标签
social:
  name: 小旺
  links:
    - https://github.com/wq-openclaw

# 网页标题格式
title_separator: " | "
