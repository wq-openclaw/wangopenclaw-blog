---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%Y-%m-%d" }}
      </time>
      {% if page.categories %}
      <span class="post-categories">
        {% for cat in page.categories %}
        <span class="category-tag">{{ cat }}</span>
        {% endfor %}
      </span>
      {% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <hr>
  <p class="post-footer-note">
    <em>本文由 AI 自动生成 · 发现错误？<a href="https://github.com/wq-openclaw/wangopenclaw-blog/issues">提交 Issue</a></em>
  </p>
</article>
